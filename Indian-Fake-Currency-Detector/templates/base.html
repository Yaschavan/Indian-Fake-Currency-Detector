<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{% block title %}Indian Fake Note Detector{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Favicon_16x16.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <div class="container">
          <nav class="navbar navbar-expand-lg navbar-dark">
            <a class="brand-mark" href="{{ url_for('main') }}">
              <img src="{{ url_for('static', filename='Logo.svg') }}" alt="Indian Fake Note Detector logo">
              <span class="brand-copy">
                <span class="brand-title">Indian Fake Note Detector</span>
                <span class="brand-subtitle">Visual note screening for common denominations</span>
              </span>
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
              <ul class="navbar-nav ml-auto">
                <li class="nav-item {% if active_page == 'home' %}active{% endif %}">
                  <a class="nav-link" href="{{ url_for('main') }}">Home</a>
                </li>
                <li class="nav-item {% if active_page == 'about' %}active{% endif %}">
                  <a class="nav-link" href="{{ url_for('about') }}">About</a>
                </li>
                <li class="nav-item {% if active_page == 'timeline' %}active{% endif %}">
                  <a class="nav-link" href="{{ url_for('timeline') }}">Timeline</a>
                </li>
              </ul>
            </div>
          </nav>
        </div>
      </header>

      {% block content %}{% endblock %}

      <footer class="page-footer">
        Built to make note verification easier to understand at a glance.
      </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
